name: Deploy Pages

on:
  push:
    branches: ["main"]


jobs:
  quality:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true
          fetch-depth: 0

      - name: Pull LFS objects
        run: git lfs pull

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: |
            requirements.txt
            pyproject.toml

      - name: Install dependencies and quality tooling
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi
          pip install ruff mypy

      - name: Ruff checks
        run: ruff check scripts utils tests

      - name: Mypy report (informativo)
        continue-on-error: true
        run: |
          mypy scripts utils --config-file pyproject.toml --no-error-summary > mypy-report.txt || true
          echo "Ultimas lineas de mypy-report.txt"
          tail -n 40 mypy-report.txt || true

      - name: Upload mypy report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mypy-report
          path: mypy-report.txt

      - name: UTF-8 validation
        run: python scripts/validate_encoding.py

      - name: Markdown format validation (informativo)
        continue-on-error: true
        run: python scripts/validate_markdown_format.py

      - name: Run tests
        run: python -m pytest -q

  deploy:
    needs: quality
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    permissions:
      pages: write
      id-token: write
      contents: read

    steps:
      # 1. Checkout con LFS habilitado
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true
          fetch-depth: 0

      # 1.1 Pull explicito de archivos LFS para asegurar que no sean punteros
      - name: Pull LFS objects
        run: git lfs pull

      # 2. Configurar Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: |
            requirements.txt
            pyproject.toml

      # 3.1 Configurar Pages
      - name: Setup Pages
        uses: actions/configure-pages@v5

      # 3. Instalar dependencias (solo si existe requirements.txt)
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi

      # 4. Build unificado
      - name: Unified build
        run: python scripts/build.py --with-assets --verbose

      # 6. Crear archivo .nojekyll y verificar contenido
      - name: Verify and Disable Jekyll
        run: |
          touch site/.nojekyll
          echo "Listado de archivos en site/assets (primeros niveles):"
          find site/assets -maxdepth 3

      # 7. Subir artefacto
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./site

      # 8. Deploy
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
