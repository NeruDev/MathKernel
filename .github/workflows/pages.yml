name: Deploy Pages

on:
  push:
    branches: ["main"]


jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    permissions:
      pages: write
      id-token: write
      contents: read

    steps:
      # 1. Checkout con LFS habilitado
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true
          fetch-depth: 0

      # 1.1 Pull explicito de archivos LFS para asegurar que no sean punteros
      - name: Pull LFS objects
        run: git lfs pull

      # 2. Configurar Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # 3.1 Configurar Pages
      - name: Setup Pages
        uses: actions/configure-pages@v5

      # 3. Instalar dependencias (solo si existe requirements.txt)
      - name: Install dependencies
        run: |
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi

      # 4. Build unificado
      - name: Unified build
        run: python scripts/build.py --with-assets --verbose

      # 6. Crear archivo .nojekyll y verificar contenido
      - name: Verify and Disable Jekyll
        run: |
          touch site/.nojekyll
          echo "Listado de archivos en site/assets (primeros niveles):"
          find site/assets -maxdepth 3

      # 7. Subir artefacto
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./site

      # 8. Deploy
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
