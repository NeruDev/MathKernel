[tool.ruff]
target-version = "py311"
line-length = 100
src = ["scripts", "utils", "tests"]
exclude = [
    ".venv",
    "venv",
    "env",
    "site",
    "assets",
    "metadata",
    "content",
    "build",
    "dist",
]

[tool.ruff.lint]
select = ["F", "E9", "I"]

[tool.ruff.lint.isort]
known-first-party = ["scripts", "utils"]

[tool.mypy]
python_version = "3.11"
pretty = true
show_error_codes = true
warn_unused_configs = true
warn_redundant_casts = true
warn_unused_ignores = true
ignore_missing_imports = true
check_untyped_defs = false
disallow_untyped_defs = false
exclude = "(^site/|^assets/|^content/|^metadata/|^\\.venv/|^venv/)"